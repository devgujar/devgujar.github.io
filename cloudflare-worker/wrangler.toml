# Cloudflare Worker config for the Groq chat proxy.
# Deploy with:  wrangler deploy   (run from this folder)

name = "groq-proxy"
main = "groq-proxy.js"
compatibility_date = "2025-01-01"

# GROQ_API_KEY is NOT stored here. Set it as an encrypted secret instead:
#   wrangler secret put GROQ_API_KEY
#
# After deploy, endpoint will be something like:
#   https://groq-proxy.<your-subdomain>.workers.dev/api/chat

