<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">One Framework</title>
  <desc id="desc">Unified UI and API automation framework icon</desc>
  <defs>
    <linearGradient id="of-core" x1="24" y1="24" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="of-ui" x1="10" y1="14" x2="42" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
    <linearGradient id="of-api" x1="54" y1="50" x2="86" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="of-link" x1="30" y1="40" x2="66" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset=".5" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="of-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connection arcs -->
  <path d="M38 34C44 42 52 44 58 48" stroke="url(#of-link)" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>
  <path d="M58 48C52 56 44 58 38 62" stroke="url(#of-link)" stroke-width="2.5" stroke-linecap="round" opacity=".7"/>

  <!-- UI module -->
  <rect x="10" y="14" width="34" height="28" rx="7" fill="url(#of-ui)" opacity=".95"/>
  <rect x="14" y="18" width="26" height="4" rx="2" fill="#fff" opacity=".92"/>
  <rect x="14" y="26" width="18" height="3" rx="1.5" fill="#fff" opacity=".5"/>
  <rect x="14" y="32" width="22" height="3" rx="1.5" fill="#fff" opacity=".5"/>
  <circle cx="36" cy="20" r="2" fill="#fbbf24"/>
  <circle cx="40" cy="20" r="2" fill="#34d399"/>
  <!-- Cursor -->
  <path d="M22 36l6 14 2.5-5.5 5.5-2.5-14-6Z" fill="#fff" opacity=".95"/>

  <!-- API module -->
  <rect x="54" y="50" width="32" height="32" rx="8" fill="url(#of-api)" opacity=".95"/>
  <path d="M62 62h6v12h-6V62Z" fill="#0b1220" opacity=".75"/>
  <path d="M72 58h6v16h-6V58Z" fill="#0b1220" opacity=".55"/>
  <path d="M82 64h4v10h-4V64Z" fill="#0b1220" opacity=".85"/>
  <path d="M60 72c0-2 1.8-3.5 4-3.5h20" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".6"/>

  <!-- Central unified hub -->
  <circle cx="48" cy="48" r="18" fill="#111a2e" stroke="url(#of-core)" stroke-width="3" filter="url(#of-glow)"/>
  <circle cx="48" cy="48" r="12" fill="url(#of-core)" opacity=".25"/>
  <text x="48" y="54" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="18" font-weight="800">1</text>

  <!-- Flow arrows -->
  <path d="M44 40l4-4 4 4" stroke="#22d3ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52 56l4 4-4 4" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Orchestration ring -->
  <circle cx="48" cy="48" r="24" stroke="url(#of-core)" stroke-width="1.5" stroke-dasharray="4 5" opacity=".45"/>
</svg>
